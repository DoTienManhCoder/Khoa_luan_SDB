services:
  mongo:
    image: mongo:7
    container_name: autoshot_mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: apps/web/backend/Dockerfile
    container_name: autoshot_backend
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB: ${MONGODB_DB:-autoshot}
      STORAGE_DIR: ${STORAGE_DIR:-/app/storage}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-300}
      MAX_DURATION_SEC: ${MAX_DURATION_SEC:-600}
      JOB_TTL_HOURS: ${JOB_TTL_HOURS:-24}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-autoshot}
      AUTOSHOT_MODEL_PATH: ${AUTOSHOT_MODEL_PATH:-/app/models/deploy.pth}
      AUTOSHOT_DEVICE: ${AUTOSHOT_DEVICE:-cpu}
      AUTOSHOT_DEFAULT_TEMPERATURE: ${AUTOSHOT_DEFAULT_TEMPERATURE:-}
      AUTOSHOT_DEFAULT_SIGMA: ${AUTOSHOT_DEFAULT_SIGMA:-}
      AUTOSHOT_DEFAULT_THRESHOLD: ${AUTOSHOT_DEFAULT_THRESHOLD:-}
      AUTOSHOT_USE_BASELINE: ${AUTOSHOT_USE_BASELINE:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./apps/web/backend/storage:/app/storage
      - ./artifacts/models:/app/models:ro
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: apps/web/frontend/Dockerfile
    container_name: autoshot_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
